# Workspace root — NOT a package. The distributions live in packages/:
#   gitcad-core / gitcad-mech / gitcad-ecad / gitcad (metapackage)
# Dev install (editable, all portions):
#   pip install --no-deps -e packages/gitcad-core -e packages/gitcad-mech \
#       -e packages/gitcad-ecad -e packages/gitcad
#   pip install pytest cadquery-ocp

[tool.pytest.ini_options]
testpaths = ["tests"]
markers = [
  "occt: requires the OCCT kernel (cadquery-ocp); skipped if unavailable",
  "invariant: architecture-independent property that must always hold",
]
